name: Build and Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "VERSION"
      - "shared/skills/**"
      - "shared/targets/**"
      - "shared/ci/**"
      - "schemas/**"
      - "scripts/build/**"
      - "scripts/ci/**"
      - ".cursor/rules/**"
      - ".github/workflows/pr-ai-review.yml"
      - "scripts/lint/**"
      - "dashboard/src/App.jsx"
      - "README.md"
      - "PLAN.md"
      - "package.json"
      - "package-lock.json"
      - "runtime/adapters/**"
      - "worker/**"
      - ".github/workflows/build.yml"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/pr-mergeability-gate.yml"
      - ".github/workflows/format-check-main.yml"
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
      portable: ${{ steps.filter.outputs.portable }}
      matrix_os: ${{ steps.matrix.outputs.matrix_os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # v3.0.2 — pin commit for supply-chain stability
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            build:
              - 'VERSION'
              - 'shared/ci/**'
              - 'shared/skills/**'
              - 'shared/targets/**'
              - 'schemas/**'
              - 'scripts/build/**'
              - 'scripts/ci/**'
              - '.cursor/rules/**'
              - '.github/workflows/pr-ai-review.yml'
              - 'scripts/lint/**'
              - 'dashboard/src/App.jsx'
              - 'README.md'
              - 'PLAN.md'
              - 'package.json'
              - 'package-lock.json'
              - 'runtime/adapters/**'
              - 'worker/**'
              - '.github/workflows/build.yml'
              - '.prettierrc'
              - '.prettierignore'
              - '.github/workflows/pr-mergeability-gate.yml'
            portable:
              - 'VERSION'
              - 'shared/ci/**'
              - 'shared/skills/**'
              - 'shared/targets/**'
              - 'schemas/**'
              - 'scripts/build/**'
              - 'scripts/ci/**'
              - '.cursor/rules/**'
              - 'scripts/lint/**'
              - 'dashboard/src/App.jsx'
              - 'package.json'
              - 'package-lock.json'
              - 'runtime/adapters/**'
              - 'worker/**'

      - name: Set matrix
        id: matrix
        run: |
          if [ "${{ steps.filter.outputs.build }}" != "true" ]; then
            echo 'matrix_os=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.portable }}" = "true" ]; then
            echo 'matrix_os=["ubuntu-latest","macos-latest","windows-latest"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix_os=["ubuntu-latest"]' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: ${{ fromJSON(needs.changes.outputs.matrix_os) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install worker dependencies (typecheck)
        run: npm ci --prefix worker

      - name: Worker TypeScript (including tests)
        run: npm run check:worker-test-types

      - name: Check version parity
        run: npm run version:check

      - name: Check documented skill count drift
        run: npm run check:skill-count-drift

      - name: Lint platform files
        if: runner.os != 'Windows'
        run: node scripts/lint/platform.mjs shared/targets/platforms/*.yaml

      - name: Lint skill files
        if: runner.os != 'Windows'
        run: node scripts/lint/skill.mjs shared/skills/[!_]*/SKILL.md

      - name: Check dashboard tab documentation parity
        run: node scripts/ci/check-dashboard-tab-drift.mjs

      - name: Run test suite (includes resolver-selection + sync-loop ETag/version + worker version-pointer gates)
        run: npm test

      - name: Build emitted packages (self-sufficient packages + worker version-pointer consistency contract)
        run: node scripts/build/compile.mjs

      - name: Build with provenance (release mode)
        if: runner.os == 'Linux'
        run: node scripts/build/compile.mjs --release
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Upload Claude package to KV
        if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run deploy:upload-kv
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MANIFEST_KV_NAMESPACE_ID: ${{ secrets.MANIFEST_KV_NAMESPACE_ID }}

      - name: Verify Claude package KV publication
        if: runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run deploy:verify-upload-kv
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MANIFEST_KV_NAMESPACE_ID: ${{ secrets.MANIFEST_KV_NAMESPACE_ID }}

      - name: Validate self-sufficiency (Cursor output)
        if: runner.os == 'Linux'
        run: |
          if [ ! -d dist/clients/cursor/skills ]; then
            echo "ERROR: dist/clients/cursor/skills not found (Cursor Agent Skills MUST be emitted)"
            exit 1
          fi
          if [ ! -f dist/clients/cursor/.emit-meta.json ]; then
            echo "ERROR: dist/clients/cursor/.emit-meta.json not found"
            exit 1
          fi
          python3 -c "
          import json, os, sys
          with open('dist/clients/cursor/.emit-meta.json') as f:
            m = json.load(f)
          assert m.get('emit_kind') == 'cursor-agent-skills', m
          v = m.get('version', '')
          parts = v.split('.')
          assert len(parts) == 3 and all(p.isdigit() for p in parts), v
          assert m.get('skills_count', 0) > 0
          n = len([d for d in os.listdir('dist/clients/cursor/skills') if os.path.isdir(os.path.join('dist/clients/cursor/skills', d))])
          assert n == m['skills_count'], (n, m['skills_count'])
          "
          echo "Cursor output validation passed ✓"

      - name: Validate self-sufficiency (Registry)
        if: runner.os == 'Linux'
        run: |
          if [ ! -f dist/registry/index.json ]; then
            echo "ERROR: dist/registry/index.json not found"
            exit 1
          fi
          python3 -c "
          import json, sys
          with open('dist/registry/index.json') as f:
              d = json.load(f)
          assert 'version' in d, 'Missing version'
          assert 'skills' in d, 'Missing skills'
          assert len(d['skills']) > 0, 'No skills in registry'
          # v0.5.2: verify compatibility matrix exists
          for skill in d['skills']:
              assert 'compatibility' in skill, f'Missing compatibility for {skill[\"id\"]}'
              assert len(skill['compatibility']) > 0, f'Empty compatibility for {skill[\"id\"]}'
          print(f'Registry OK: {len(d[\"skills\"])} skill(s), platforms: {d[\"platforms\"]}')
          print(f'All skills have compatibility matrix ✓')
          "

      - name: Validate self-sufficiency (claude-code package)
        if: runner.os == 'Linux'
        run: |
          if [ ! -f dist/clients/claude-code/.claude-plugin/plugin.json ]; then
            echo "ERROR: plugin.json not found"
            exit 1
          fi
          if [ ! -d dist/clients/claude-code/skills ]; then
            echo "ERROR: skills dir not found"
            exit 1
          fi
          SKILL_COUNT=$(ls dist/clients/claude-code/skills | wc -l)
          echo "claude-code output OK: ${SKILL_COUNT} skill(s)"

      - name: Upload dist as artefact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 30

  build-not-needed:
    name: Build (skipped — no matching paths)
    needs: changes
    if: needs.changes.outputs.build != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No paths matched the build workflow filters; skipping compile and multi-platform tests."
        shell: bash
