name: Build and Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
      - 'shared/skills/**'
      - 'shared/targets/**'
      - 'schemas/**'
      - 'scripts/build/**'
      - 'scripts/lint/**'
      - 'package.json'
  pull_request:
    paths:
      - 'VERSION'
      - 'shared/skills/**'
      - 'shared/targets/**'
      - 'schemas/**'
      - 'scripts/build/**'
      - 'scripts/lint/**'
      - 'package.json'

jobs:
  build:
    name: Compile skills and validate output
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check version parity
        run: npm run version:check

      - name: Lint platform files
        run: node scripts/lint/platform.mjs shared/targets/platforms/*.yaml

      - name: Lint skill files
        run: node scripts/lint/skill.mjs shared/skills/[!_]*/SKILL.md

      - name: Run tests
        run: npm test

      - name: Run compiler (validate-only)
        run: node scripts/build/compile.mjs --validate-only

      - name: Run compiler (full build)
        run: node scripts/build/compile.mjs

      - name: Run compiler (release mode)
        run: node scripts/build/compile.mjs --release
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Validate Cursor output (strict)
        run: |
          if [ ! -f dist/clients/cursor/.cursorrules ]; then
            echo "ERROR: dist/clients/cursor/.cursorrules not found (Cursor artefact MUST be emitted)"
            exit 1
          fi
          if [ ! -s dist/clients/cursor/.cursorrules ]; then
            echo "ERROR: dist/clients/cursor/.cursorrules is empty"
            exit 1
          fi
          # Verify expected header structure
          if ! grep -q "# AI Config OS — Cursor Rules" dist/clients/cursor/.cursorrules; then
            echo "ERROR: Missing AI Config OS header in Cursor output"
            exit 1
          fi
          if ! grep -qE "# Version: [0-9]+\.[0-9]+\.[0-9]+" dist/clients/cursor/.cursorrules; then
            echo "ERROR: Missing version header in Cursor output"
            exit 1
          fi
          if ! grep -qE "# Skills: [0-9]+" dist/clients/cursor/.cursorrules; then
            echo "ERROR: Missing skill count header in Cursor output"
            exit 1
          fi
          echo "Cursor output validation passed ✓"

      - name: Validate registry output
        run: |
          if [ ! -f dist/registry/index.json ]; then
            echo "ERROR: dist/registry/index.json not found"
            exit 1
          fi
          python3 -c "
          import json, sys
          with open('dist/registry/index.json') as f:
              d = json.load(f)
          assert 'version' in d, 'Missing version'
          assert 'skills' in d, 'Missing skills'
          assert len(d['skills']) > 0, 'No skills in registry'
          # v0.5.2: verify compatibility matrix exists
          for skill in d['skills']:
              assert 'compatibility' in skill, f'Missing compatibility for {skill[\"id\"]}'
              assert len(skill['compatibility']) > 0, f'Empty compatibility for {skill[\"id\"]}'
          print(f'Registry OK: {len(d[\"skills\"])} skill(s), platforms: {d[\"platforms\"]}')
          print(f'All skills have compatibility matrix ✓')
          "

      - name: Validate claude-code output
        run: |
          if [ ! -f dist/clients/claude-code/.claude-plugin/plugin.json ]; then
            echo "ERROR: plugin.json not found"
            exit 1
          fi
          if [ ! -d dist/clients/claude-code/skills ]; then
            echo "ERROR: skills dir not found"
            exit 1
          fi
          SKILL_COUNT=$(ls dist/clients/claude-code/skills | wc -l)
          echo "claude-code output OK: ${SKILL_COUNT} skill(s)"

      - name: Upload dist as artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 30
