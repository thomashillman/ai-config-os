name: PR Mergeability Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  merge-git:
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Fetch base branch tip
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          git fetch origin "${BASE_REF}" --depth=50 --prune

      - name: Ensure PR branch clean
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree is not clean in CI checkout"
            git status --short
            exit 1
          fi

      - name: Simulate merge from base (must be conflict-free)
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref || 'main' }}"
          if ! git merge --no-commit --no-ff "origin/${BASE_REF}"; then
            echo "Merge conflicts detected against origin/${BASE_REF}"
            git diff --name-only --diff-filter=U || true
            git merge --abort || true
            exit 1
          fi
          git merge --abort || true

      - name: "Guard: no conflict markers in tracked files"
        run: |
          if rg -n "(^<{7}|^={7}|^>{7})" \
            --glob '!**/node_modules/**' \
            --glob '!.git/**' . ; then
            echo "Conflict markers found"
            exit 1
          fi

  changes:
    needs: merge-git
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      full_ci: ${{ steps.set.outputs.full_ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # v3.0.2 — pin commit for supply-chain stability
      # full_ci: when ANY of these paths change, merge-node runs validate/build/test.
      # Canonical list: shared/ci/full-ci-globs.json — run npm run validate:full-ci-manifest
      # after editing this block or the manifest (CI fails if they diverge).
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            full_ci:
              - 'VERSION'
              - 'shared/**'
              - 'schemas/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'worker/**'
              - 'runtime/**'
              - 'plugins/**'
              - 'dashboard/**'
              - '.cursor/rules/**'
              - '.github/workflows/**'
              - 'ops/**'
              - 'adapters/**'

      - name: Set full_ci output
        id: set
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "full_ci=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.full_ci }}" == "true" ]; then
            echo "full_ci=true" >> $GITHUB_OUTPUT
          else
            echo "full_ci=false" >> $GITHUB_OUTPUT
          fi

  merge-node:
    needs: [merge-git, changes]
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Fetch base branch tip
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          git fetch origin "${BASE_REF}" --depth=50 --prune

      - name: Ensure PR branch clean
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree is not clean in CI checkout"
            git status --short
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (changed files)
        env:
          MERGE_BASE_REF: ${{ github.base_ref || 'main' }}
        run: node scripts/ci/format-check-changed.mjs

      - name: Validate Cursor project rules
        run: npm run check:cursor-rules

      - name: Check if dashboard changed
        id: dashboard-check
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          if git diff --name-only "origin/${BASE_REF}...HEAD" -- dashboard/ | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dashboard dependencies
        if: steps.dashboard-check.outputs.changed == 'true'
        run: npm --prefix dashboard install

      - name: Validate
        if: needs.changes.outputs.full_ci == 'true'
        run: npm run -s validate

      - name: Build
        if: needs.changes.outputs.full_ci == 'true'
        run: npm run -s build

      - name: Test
        if: needs.changes.outputs.full_ci == 'true'
        run: npm run -s test

      - name: Verify
        env:
          DASH_CHANGED: ${{ steps.dashboard-check.outputs.changed }}
        run: |
          set -euo pipefail
          ARGS="--skip-tests"
          if [ "${DASH_CHANGED}" != "true" ]; then
            ARGS="$ARGS --skip-dashboard"
          fi
          npm run -s verify -- $ARGS

  # Job id merge-gate-status is what branch protection / rulesets require; name: is the UI label.
  # needs.*.result values: success | failure | cancelled | skipped
  # https://docs.github.com/en/actions/learn-github-actions/contexts#needs-context
  # Inline shell (not node scripts from checkout): logic must not run from PR head or a PR
  # could replace scripts/ci/* and bypass the gate. Keep in sync with scripts/ci/lib/merge-gate-status-logic.mjs.
  merge-gate-status:
    name: Merge gate status
    needs: [merge-git, changes, merge-node]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check merge gate jobs
        env:
          MERGE_GIT: ${{ needs.merge-git.result }}
          CHANGES: ${{ needs.changes.result }}
          MERGE_NODE: ${{ needs.merge-node.result }}
        run: |
          set -euo pipefail
          echo "merge-git=${MERGE_GIT} changes=${CHANGES} merge-node=${MERGE_NODE}"
          if [ "${MERGE_GIT}" = "failure" ] || [ "${MERGE_GIT}" = "cancelled" ] \
            || [ "${CHANGES}" = "failure" ] || [ "${CHANGES}" = "cancelled" ] \
            || [ "${MERGE_NODE}" = "failure" ] || [ "${MERGE_NODE}" = "cancelled" ]; then
            echo "::error::Merge gate failed (merge-git=${MERGE_GIT} changes=${CHANGES} merge-node=${MERGE_NODE})"
            exit 1
          fi
          if [ "${MERGE_GIT}" = "skipped" ] && [ "${CHANGES}" = "skipped" ] && [ "${MERGE_NODE}" = "skipped" ]; then
            echo "Merge gate jobs skipped (e.g. draft PR) — OK"
            exit 0
          fi
          if [ "${MERGE_GIT}" = "success" ] && [ "${CHANGES}" = "success" ] && [ "${MERGE_NODE}" = "success" ]; then
            echo "Merge gate passed"
            exit 0
          fi
          echo "::error::Unexpected merge gate job states: merge-git=${MERGE_GIT} changes=${CHANGES} merge-node=${MERGE_NODE}"
          exit 1
