name: Validate plugin structure

on:
  push:
    branches: [main]
    paths:
      - "shared/skills/**"
      - "plugins/**"
      - "runtime/**"
      - "shared/lib/**"
      - "ops/**"
      - "scripts/ci/**"
      - ".cursor/rules/**"
      - ".github/workflows/pr-ai-review.yml"
      - "PLAN.md"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate.yml"
      - ".prettierrc"
      - ".prettierignore"
      - ".github/workflows/pr-mergeability-gate.yml"
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      validate: ${{ steps.filter.outputs.validate }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # v3.0.2 — pin commit for supply-chain stability
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            validate:
              - 'shared/skills/**'
              - 'plugins/**'
              - 'runtime/**'
              - 'shared/lib/**'
              - 'ops/**'
              - 'scripts/ci/**'
              - '.cursor/rules/**'
              - '.github/workflows/pr-ai-review.yml'
              - 'PLAN.md'
              - 'README.md'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/validate.yml'
              - '.prettierrc'
              - '.prettierignore'
              - '.github/workflows/pr-mergeability-gate.yml'

  validate:
    needs: changes
    if: needs.changes.outputs.validate == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=50 --prune

      - name: Check for broken symlinks
        run: |
          broken=$(find plugins/ -type l ! -exec test -e {} \; -print)
          if [ -n "$broken" ]; then
            echo "Broken symlinks found:"
            echo "$broken"
            exit 1
          fi
          echo "All symlinks valid."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Cursor project rules
        run: npm run check:cursor-rules

      - name: Check documented skill count drift
        run: npm run check:skill-count-drift

      - name: Validate skill frontmatter
        run: |
          ERRORS=0
          for skill_dir in shared/skills/*/; do
            skill_name=$(basename "$skill_dir")
            [ "$skill_name" = "_template" ] && continue
            if ! bash ops/lint-skill.sh "$skill_name"; then
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS skill(s) failed frontmatter validation"
            exit 1
          fi

      - name: Check version bump on skill changes
        if: github.event_name == 'pull_request'
        run: |
          SKILL_CHANGES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- shared/skills/ plugins/core-skills/skills/ | grep -v '_template/' || true)
          VERSION_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- plugins/core-skills/.claude-plugin/plugin.json || true)
          if [ -n "$SKILL_CHANGES" ] && [ -z "$VERSION_CHANGED" ]; then
            echo "::warning::Skill files changed but plugin.json version was not bumped. Updates won't propagate to other devices."
          fi

      - name: Check doc coverage for skill and structure changes
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Skill added/changed => manifest.md should be updated
          SKILL_CHANGES=$(echo "$CHANGED" | grep -E '^shared/skills/' | grep -v '_template/' || true)
          MANIFEST_CHANGED=$(echo "$CHANGED" | grep 'shared/manifest.md' || true)
          if [ -n "$SKILL_CHANGES" ] && [ -z "$MANIFEST_CHANGED" ]; then
            echo "::warning::Skill files changed but shared/manifest.md was not updated. Add or update the skill's table row."
          fi

          # Structural changes (new ops script, new adapter) => README should be updated
          STRUCT_CHANGES=$(echo "$CHANGED" | grep -E '^(ops/|adapters/|plugins/)' || true)
          README_CHANGED=$(echo "$CHANGED" | grep 'README.md' || true)
          if [ -n "$STRUCT_CHANGES" ] && [ -z "$README_CHANGED" ]; then
            echo "::warning::Structural files (ops/, adapters/, plugins/) changed but README.md was not updated. Check the directory table."
          fi

      - name: Enforce canonical support-truth doc
        run: bash ops/check-support-truth.sh

      - name: Install runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq yq || true

      - name: Install runtime dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq yq 2>/dev/null || true

      - name: Validate tool registry
        run: bash runtime/validate-registry.sh

      - name: Validate runtime config schema
        run: |
          bash shared/lib/config-merger.sh > /dev/null
          echo "Config merge: OK"

  validate-not-needed:
    name: Validate plugin (skipped — no matching paths)
    needs: changes
    if: needs.changes.outputs.validate != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No paths matched the validate workflow filters; skipping plugin/runtime validation."
        shell: bash
