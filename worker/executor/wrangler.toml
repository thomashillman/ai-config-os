name = "ai-config-os-executor"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# PHASE 1 EXECUTOR WORKER (Cloudflare-only)
#
# Invoked by main Worker via service binding (no external URL needed).
# Supports only Phase 1 tools: KV/R2 queries and metadata operations.
# Phase 0 tools (shell, filesystem, git, sync) return 403 TOOL_NOT_SUPPORTED.
# Maximum timeout: 15 seconds (Cloudflare Worker isolation constraint).
# No shell execution, no filesystem access, no external subprocess spawning.

# SECRETS
# EXECUTOR_SHARED_SECRET — set via: wrangler secret put EXECUTOR_SHARED_SECRET --env production

[vars]
ENVIRONMENT = "production"
EXECUTOR_TIMEOUT_MS = "15000"

[[kv_namespaces]]
binding = "MANIFEST_KV"
id = "92c2036894ca42d2a7732ea98c0c53a6"

[[r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "artefacts-r2"

# Staging environment
[env.staging]

[env.staging.vars]
ENVIRONMENT = "staging"
EXECUTOR_TIMEOUT_MS = "15000"

[[env.staging.kv_namespaces]]
binding = "MANIFEST_KV"
id = "92c2036894ca42d2a7732ea98c0c53a6"

[[env.staging.r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "artefacts-r2"
