name = "ai-config-os-executor"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# PHASE 1 EXECUTOR WORKER (Cloudflare-only)
#
# This is the Phase 1 executor, invoked by main Worker via service binding.
# Only supports KV/R2 queries (Phase 1 tool subset).
# Maximum timeout: 15 seconds (Worker isolation constraint).
# No shell execution, no filesystem access, no external subprocess spawning.

# SECRETS
# EXECUTOR_SHARED_SECRET — set via: wrangler secret put EXECUTOR_SHARED_SECRET --env production

[vars]
ENVIRONMENT = "production"
EXECUTOR_TIMEOUT_MS = "15000"

[[kv_namespaces]]
binding = "MANIFEST_KV"
id = "REPLACE_WITH_MANIFEST_KV_ID"

[[r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "ai-config-os-artefacts"

# Staging environment
[env.staging]

[env.staging.vars]
ENVIRONMENT = "staging"
EXECUTOR_TIMEOUT_MS = "15000"

[[env.staging.kv_namespaces]]
binding = "MANIFEST_KV"
id = "REPLACE_WITH_STAGING_MANIFEST_KV_ID"

[[env.staging.r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "ai-config-os-artefacts-staging"
