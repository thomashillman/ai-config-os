name = "ai-config-os"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Set AUTH_TOKEN via: wrangler secret put AUTH_TOKEN
# Set AUTH_TOKEN_NEXT via: wrangler secret put AUTH_TOKEN_NEXT (for rotation)
# Set EXECUTOR_SHARED_SECRET via: wrangler secret put EXECUTOR_SHARED_SECRET

[vars]
ENVIRONMENT = "production"
EXECUTOR_PROXY_URL = "https://remote-executor.example.com"
EXECUTOR_TIMEOUT_MS = "10000"

[[kv_namespaces]]
binding = "MANIFEST_KV"
id = "REPLACE_WITH_MANIFEST_KV_ID"

[[r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "ai-config-os-artefacts"

# The dist/ registry and client bundles are bundled into the worker at deploy time.
# See scripts/build/compile.mjs to regenerate dist/ before deploying.
