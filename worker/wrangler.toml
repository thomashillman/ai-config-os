name = "ai-config-os"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# PHASE 1 CLOUDFLARE-FIRST ARCHITECTURE
#
# Phase 1 is Cloudflare-first with no external executor required.
# Main Worker invokes executor Worker via service binding [[services]].
# Execution is contained entirely within Cloudflare.
#
# EXECUTOR_PROXY_URL is optional — only needed for backward compatibility
# with Phase 0 or as a seam for a future Phase 2 VPS executor.

# SECRETS — Set via: wrangler secret put <NAME> --env <ENV>
# ----------
# AUTH_TOKEN                — Bearer token for API clients (required)
# AUTH_TOKEN_NEXT           — Next bearer token for rotation (optional)
# EXECUTOR_SHARED_SECRET    — Shared secret for request verification (required)
# HANDOFF_TOKEN_SIGNING_KEY — Private key for handoff token signing (optional)
#
# Example for staging:
#   wrangler secret put AUTH_TOKEN --env staging
#   wrangler secret put EXECUTOR_SHARED_SECRET --env staging

# DEFAULT ENVIRONMENT (Production)
[vars]
ENVIRONMENT = "production"
# EXECUTOR_PROXY_URL is optional. Phase 1 uses service binding (see [[services]] below).
# Only set this if you need Phase 0 backward compatibility or a future Phase 2 VPS executor.
EXECUTOR_PROXY_URL = "https://remote-executor.example.com"
EXECUTOR_TIMEOUT_MS = "10000"

[[kv_namespaces]]
binding = "MANIFEST_KV"
id = "REPLACE_WITH_MANIFEST_KV_ID"

[[r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "ai-config-os-artefacts"

# --------------------------------------------
# STAGING ENVIRONMENT
# --------------------------------------------
[env.staging]

[env.staging.vars]
ENVIRONMENT = "staging"
# EXECUTOR_PROXY_URL is optional. Phase 1 uses service binding (see [[env.staging.services]] below).
# Only set this if you need Phase 0 backward compatibility or a future Phase 2 VPS executor.
EXECUTOR_PROXY_URL = "https://executor-staging.example.com"
EXECUTOR_TIMEOUT_MS = "10000"

# PHASE 1: Service binding to staging executor Worker (primary path)
[[env.staging.services]]
binding = "EXECUTOR"
service = "ai-config-os-executor-staging"
environment = "staging"

[[env.staging.kv_namespaces]]
binding = "MANIFEST_KV"
id = "REPLACE_WITH_STAGING_MANIFEST_KV_ID"

[[env.staging.r2_buckets]]
binding = "ARTEFACTS_R2"
bucket_name = "ai-config-os-artefacts-staging"

# --------------------------------------------
# BUILD & DEPLOYMENT
# The dist/ registry and client bundles are bundled into the worker at deploy time.
# See scripts/build/compile.mjs to regenerate dist/ before deploying.

# PHASE 1: Service binding to production executor Worker (primary path)
[[services]]
binding = "EXECUTOR"
service = "ai-config-os-executor"
environment = "production"

#
# Deploy staging:
#   npm run build
#   wrangler deploy --env staging
#
# Deploy production:
#   npm run build
#   wrangler deploy
